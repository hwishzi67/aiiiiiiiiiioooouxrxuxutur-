<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AETHER AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0B0E14;
            color: #EDEDF0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .navbar {
            height: 60px;
            background: #0B0E14;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .menu-btn {
            background: transparent;
            border: none;
            color: #E2E8F0;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 10px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .menu-btn:active {
            background: rgba(255,255,255,0.08);
            transform: scale(0.95);
        }
        .logo-area {
            font-weight: 700;
            font-size: 1.1rem;
            color: #E2E8F0;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 290px;
            height: 100%;
            background: #0F121C;
            z-index: 200;
            transition: right 0.25s ease-out;
            box-shadow: -10px 0 35px rgba(0, 0, 0, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { 
            right: 0; 
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: #A0AEC0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 10px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
        }
        .conv-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.2s;
        }
        .conv-item:active {
            background: rgba(255,255,255,0.07);
        }
        .conv-item.active {
            background: #1E1F2C;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .conv-name {
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
            flex: 1;
            text-align: right;
        }
        .edit-name-btn {
            background: transparent;
            border: none;
            color: #718096;
            cursor: pointer;
            padding: 8px 10px;
            font-size: 0.95rem;
            border-radius: 6px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #0B0E14;
            position: relative;
            z-index: 1;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .user-message {
            background: #232530;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: #131622;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .chat-img, .chat-video {
            max-width: 100%;
            max-height: 240px;
            border-radius: 10px;
            margin-top: 6px;
            object-fit: cover;
        }
        .chat-file-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-top: 6px;
        }
        .chat-file-card i { font-size: 1.6rem; color: #A0AEC0; }
        .file-info { display: flex; flex-direction: column; font-size: 0.85rem; }
        .file-size { color: #718096; font-size: 0.75rem; margin-top: 2px; }

        .input-capsule {
            background: #0B0E14;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 16px 16px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 100;
        }
        
        .preview-bar {
            display: none;
            align-items: center;
            background: #161924;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .preview-content {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #CBD5E0;
            flex: 1;
            overflow: hidden;
        }
        .preview-thumb {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            object-fit: cover;
        }
        .remove-preview-btn {
            background: transparent;
            border: none;
            color: #E53E3E;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #161924;
            border-radius: 26px;
            padding: 6px 10px 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 52px;
        }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.95rem;
            color: #FFFFFF;
            outline: none;
            padding: 0 10px;
            height: 100%;
        }
        .input-field::placeholder {
            color: #718096;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: #A0AEC0;
            font-size: 1.25rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:active {
            background: rgba(255,255,255,0.1);
            transform: scale(0.92);
        }

        .send-stop-btn {
            background: #252938;
            color: #E2E8F0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-stop-btn.stop-mode {
            background: #E53E3E !important;
            color: white !important;
            border-radius: 8px !important;
        }

        .code-block {
            background: #05070B;
            border-radius: 10px;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            width: 100%;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #0D0F16;
            font-size: 0.8rem;
            color: #718096;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: #A0AEC0;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .copy-btn.copied { color: #38A169 !important; }
        pre {
            padding: 16px;
            overflow-x: auto;
            color: #CBD5E0;
            font-family: 'Courier New', monospace;
            font-size: 0.88rem;
            white-space: pre;
        }
    
        #scrollBottomBtn {
            position: fixed;
            left: 15px;
            bottom: 90px;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: #252938;
            color: #fff;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <button id="newChatTopBtn" style="background:transparent;border:none;color:white;font-size:1.6rem;cursor:pointer;">✎</button>
    <div class="nav-right">
        <button class="menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
        <div class="logo-area" id="headerTitle">AETHER AI</div>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>المحادثات القديمة</h3>
        <button class="back-btn" id="closeSidebarBtn"><i class="fas fa-arrow-left"></i></button>
    </div>
    <div class="conversations-list" id="convList"></div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-capsule" id="inputCapsule">
    <div class="preview-bar" id="previewBar">
        <div class="preview-content" id="previewContent"></div>
        <button class="remove-preview-btn" id="removePreviewBtn"><i class="fas fa-times"></i></button>
    </div>

    <div class="input-row">
        <button class="icon-btn" id="uploadBtn"><i class="fas fa-plus"></i></button>
        <input type="text" class="input-field" id="messageInput" placeholder="اكتب رسالتك هنا...">
        <button class="icon-btn send-stop-btn" id="sendStopBtn"><i class="fas fa-arrow-up"></i></button>
    </div>
</div>

<input type="file" id="fileSelector" style="display: none;" accept="image/*,video/*,.pdf,.doc,.docx,.txt">
<button id="scrollBottomBtn">↓</button>

<script>
    // 🔴 حط مفتاح الـ API الخاص بك من Google AI Studio هنا ليعمل الموقع مباشرة وصاروخي!
    const GEMINI_API_KEY = "ضع_مفتاح_API_الخاص_بك_هنا";

    let db = null;
    let conversations = [];
    let currentId = null;
    let isGenerating = false;
    let selectedFileData = null;
    let chatHistory = [];

    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendStopBtn = document.getElementById('sendStopBtn');
    const sidebar = document.getElementById('sidebar');
    const convList = document.getElementById('convList');
    const headerTitle = document.getElementById('headerTitle');
    const fileSelector = document.getElementById('fileSelector');
    const previewBar = document.getElementById('previewBar');
    const previewContent = document.getElementById('previewContent');
    const removePreviewBtn = document.getElementById('removePreviewBtn');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const uploadBtn = document.getElementById('uploadBtn');

    function scrollToBottom() {
        requestAnimationFrame(() => {
            chatArea.scrollTop = chatArea.scrollHeight;
        });
    }

    const dbRequest = indexedDB.open("AetherDatabase", 1);
    dbRequest.onupgradeneeded = function(e) {
        let database = e.target.result;
        if (!database.objectStoreNames.contains("state")) {
            database.createObjectStore("state", { keyPath: "id" });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        loadFromDB();
    };

    function saveToDB() {
        if (!db) return;
        let tx = db.transaction("state", "readwrite");
        let store = tx.objectStore("state");
        store.put({ id: "main_state", conversations, currentId });
        renderSidebar();
    }

    function loadFromDB() {
        if (!db) return;
        let tx = db.transaction("state", "readonly");
        let store = tx.objectStore("state");
        let req = store.get("main_state");
        req.onsuccess = function() {
            if (req.result) {
                conversations = req.result.conversations || [];
                currentId = req.result.currentId || null;
            }
            if (conversations.length === 0) {
                startNewChat();
            } else {
                if (!currentId) currentId = conversations[0].id;
                renderSidebar();
                loadMessages();
            }
        };
    }

    function renderSidebar() {
        convList.innerHTML = '';
        conversations.forEach(c => {
            const item = document.createElement('div');
            item.className = `conv-item ${c.id === currentId ? 'active' : ''}`;
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'conv-name';
            nameSpan.textContent = c.name;

            const editBtn = document.createElement('button');
            editBtn.className = 'edit-name-btn';
            editBtn.innerHTML = '<i class="fas fa-pen"></i>';
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const newName = prompt('أدخل الاسم الجديد:', c.name);
                if (newName && newName.trim()) {
                    c.name = newName.trim();
                    if (c.id === currentId) headerTitle.textContent = c.name;
                    saveToDB();
                }
            });

            item.appendChild(nameSpan);
            item.appendChild(editBtn);
            convList.appendChild(item);
        });
    }

    function loadMessages() {
        chatArea.innerHTML = '';
        const active = conversations.find(c => c.id === currentId);
        if (!active) { startNewChat(); return; }
        headerTitle.textContent = active.name;
        
        chatHistory = [];
        active.messages.forEach(m => {
            appendDOM(m.role, m.text, m.file);
            if (m.text && m.text !== '🛑 تم إيقاف الكتابة.') {
                chatHistory.push({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.text }]
                });
            }
        });
        scrollToBottom();
    }

    window.copyCode = function(button, elementId) {
        const codeText = document.getElementById(elementId)?.textContent || '';
        navigator.clipboard.writeText(codeText).then(() => {
            const original = button.innerHTML;
            button.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
            button.classList.add('copied');
            setTimeout(() => {
                button.innerHTML = original;
                button.classList.remove('copied');
            }, 2000);
        });
    };

    function appendDOM(role, text, fileObj) {
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        
        if (fileObj) {
            if (fileObj.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = fileObj.src;
                img.className = 'chat-img';
                div.appendChild(img);
            } else if (fileObj.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = fileObj.src;
                video.className = 'chat-video';
                video.controls = true;
                div.appendChild(video);
            }
        }

        if (text) {
            const container = document.createElement('div');
            if (text.includes('```')) {
                const parts = text.split('```');
                let html = '';
                parts.forEach((part, i) => {
                    if (i % 2 === 1) {
                        const id = 'code_' + Date.now() + '_' + Math.random().toString(36).slice(2);
                        const codeLines = part.split('\n');
                        const lang = codeLines.shift();
                        html += `<div class="code-block">
                            <div class="code-header"><span>${lang || 'code'}</span>
                            <button class="copy-btn" onclick="copyCode(this,'${id}')"><i class="fas fa-copy"></i> نسخ</button></div>
                            <pre><code id="${id}">${codeLines.join('\n').trim()}</code></pre></div>`;
                    } else {
                        html += `<div>${part.replace(/\n/g,'<br>')}</div>`;
                    }
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = `<div>${text.replace(/\n/g,'<br>')}</div>`;
            }
            div.appendChild(container);
        }
        
        chatArea.appendChild(div);
        scrollToBottom();
    }

    function startNewChat() {
        const id = Date.now().toString();
        conversations.unshift({ id, name: 'محادثة جديدة ✦', messages: [{ role: 'ai', text: 'مرحباً بك مع جيل AETHER AI الخارق! كيف أقدر أساعدك اليوم؟' }] });
        currentId = id;
        chatHistory = [];
        saveToDB();
        loadMessages();
    }

    async function handleSend() {
        if (isGenerating) return;

        const val = messageInput.value.trim();
        if (!val && !selectedFileData) return;

        const active = conversations.find(c => c.id === currentId);
        if (!active) return;

        const userMsg = { role: 'user', text: val, file: selectedFileData };
        if (active.name === 'محادثة جديدة ✦' && val.length > 0) {
            active.name = val.substring(0,30);
        }

        active.messages.push(userMsg);
        appendDOM('user', val, selectedFileData);
        
        let backupFileData = selectedFileData;
        selectedFileData = null;
        previewBar.style.display = 'none';
        messageInput.value = '';

        isGenerating = true;
        sendStopBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            let requestParts = [];
            
            if (backupFileData && backupFileData.type.startsWith('image/')) {
                const base64Data = backupFileData.src.split(',')[1];
                requestParts.push({
                    inlineData: {
                        mimeType: backupFileData.type,
                        data: base64Data
                    }
                });
            }

            const systemPrompt = "أنت مساعد ذكاء اصطناعي خارق واسمك AETHER AI، خبير ومحترف جداً في البرمجة والأمن السيبراني وروبلوكس. تكلم دائماً بالعامية السعودية المريحة وبدون أي رسميات. اكتب الأكواد كاملة بدون أي اختصار داخل علامات الأكواد الثلاثية.";
            requestParts.push({ text: `${systemPrompt}\n\nالمستخدم: ${val}` });

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [...chatHistory, { role: "user", parts: requestParts }]
                })
            });

            const data = await response.json();
            const replyText = data.candidates[0].content.parts[0].text;

            const aiMsg = { role: 'ai', text: replyText };
            active.messages.push(aiMsg);
            appendDOM('ai', replyText);

            chatHistory.push({ role: 'user', parts: [{ text: val }] });
            chatHistory.push({ role: 'model', parts: [{ text: replyText }] });

        } catch (error) {
            appendDOM('ai', "❌ فشل الاتصال بالذكاء الاصطناعي، تأكد من وضع مفتاح الـ API بشكل صحيح.");
        } finally {
            isGenerating = false;
            sendStopBtn.innerHTML = '<i class="fas fa-arrow-up"></i>';
            saveToDB();
        }
    }

    sendStopBtn.onclick = handleSend;
    messageInput.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); handleSend(); } };
    
    menuToggleBtn.onclick = () => sidebar.classList.add('open');
    closeSidebarBtn.onclick = () => sidebar.classList.remove('open');
    uploadBtn.onclick = () => fileSelector.click();
    
    fileSelector.onchange = () => {
        const file = fileSelector.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            selectedFileData = {
                name: file.name, type: file.type,
                src: e.target.result
            };
            if (file.type.startsWith('image/')) {
                previewContent.innerHTML = `<img src="${e.target.result}" class="preview-thumb"> <span>${file.name}</span>`;
            } else {
                previewContent.innerHTML = `<i class="fas fa-file" style="font-size:1.3rem; color:#A0AEC0;"></i> <span>${file.name}</span>`;
            }
            previewBar.style.display = 'flex';
        };
        reader.readAsDataURL(file);
    };

    removePreviewBtn.onclick = () => {
        selectedFileData = null;
        previewBar.style.display = 'none';
    };

    document.getElementById('newChatTopBtn')?.addEventListener('click', startNewChat);
</script>
</body>
</html>
